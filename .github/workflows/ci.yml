name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  test-auth-service:
    name: Test auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auth-service/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v

  test-token-manager:
    name: Test token-manager
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: token-manager
    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      AUTH_SERVICE_URL: http://localhost:8100
      SECRET_KEY: test-secret-key
      ADMIN_DEFAULT_PASSWORD: test-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: token-manager/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v

  publish:
    name: Publicar imagenes a GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-auth-service, test-token-manager]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-service:latest
            ${{ env.IMAGE_PREFIX }}/auth-service:${{ github.sha }}

      - name: Build y push token-manager
        uses: docker/build-push-action@v6
        with:
          context: ./token-manager
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/token-manager:latest
            ${{ env.IMAGE_PREFIX }}/token-manager:${{ github.sha }}

      - name: Build y push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nginx:latest
            ${{ env.IMAGE_PREFIX }}/nginx:${{ github.sha }}

