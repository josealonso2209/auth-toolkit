name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-auth-service:
    name: Test auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auth-service/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v

  test-token-manager:
    name: Test token-manager
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: token-manager
    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      AUTH_SERVICE_URL: http://localhost:8100
      SECRET_KEY: test-secret-key
      ADMIN_DEFAULT_PASSWORD: test-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: token-manager/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-token-manager]
    steps:
      - uses: actions/checkout@v4

      - name: Build auth-service
        run: docker build --target production -t auth-service:ci ./auth-service

      - name: Build token-manager
        run: docker build --target production -t token-manager:ci ./token-manager

      - name: Build nginx
        run: docker build -t nginx-proxy:ci ./nginx
