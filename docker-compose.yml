services:
  nginx:
    build: ./nginx
    ports:
      - "8200:80"
    depends_on:
      auth-service:
        condition: service_healthy
      token-manager:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  auth-service:
    build:
      context: ./auth-service
      target: production
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${AUTH_REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DEFAULT_ACCESS_TTL: ${AUTH_DEFAULT_ACCESS_TTL:-3600}
      DEFAULT_REFRESH_TTL: ${AUTH_DEFAULT_REFRESH_TTL:-2592000}
      LOG_LEVEL: ${AUTH_LOG_LEVEL:-info}
      CORS_ORIGINS: http://token-manager:8200
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - backend
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  token-manager:
    build:
      context: ./token-manager
      target: production
    environment:
      AUTH_SERVICE_URL: http://auth-service:8100
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${TM_SECRET_KEY}
      ADMIN_DEFAULT_PASSWORD: ${TM_ADMIN_DEFAULT_PASSWORD:-admin}
      LOG_LEVEL: ${TM_LOG_LEVEL:-info}
      CORS_ORIGINS: http://localhost,http://nginx
    depends_on:
      auth-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - backend
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  celery-worker:
    build:
      context: ./token-manager
      target: production
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    environment:
      AUTH_SERVICE_URL: http://auth-service:8100
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${TM_SECRET_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      LOG_LEVEL: ${TM_LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  celery-beat:
    build:
      context: ./token-manager
      target: production
    command: celery -A app.celery_app:celery beat --loglevel=info
    environment:
      AUTH_SERVICE_URL: http://auth-service:8100
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${TM_SECRET_KEY}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      LOG_LEVEL: ${TM_LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  redis_data:
  postgres_data:
