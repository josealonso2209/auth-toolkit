services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: auth_toolkit
      POSTGRES_PASSWORD: auth_toolkit
      POSTGRES_DB: auth_toolkit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_toolkit"]
      interval: 10s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: ./auth-service
      target: development
    ports:
      - "8100:8100"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      LOG_LEVEL: debug
    depends_on:
      redis:
        condition: service_healthy

  token-manager:
    build:
      context: ./token-manager
      target: development
    ports:
      - "8200:8200"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8100
      DATABASE_URL: postgresql://auth_toolkit:auth_toolkit@postgres:5432/auth_toolkit
      SECRET_KEY: dev-secret-key
      ADMIN_DEFAULT_PASSWORD: admin
      LOG_LEVEL: debug
    depends_on:
      auth-service:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
